services:
  - type: web
    name: paisa-expense-tracker-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /data/expenses.db
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
